<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bakery Website</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
        <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />

        <!-- Reset CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sansita+Swashed:wght@300..900&display=swap"
            rel="stylesheet"
        />

        <!-- Style -->
        <link rel="stylesheet" href="./assets/css/style.css" />
    </head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <!-- Logo -->
                    <a href="./">
                        <img src="./assets/images/logo.svg" alt="Keithston Coffee Shop" />
                    </a>
                    <!-- Navigation -->
                    <nav class="nav">
                        <ul class="nav__list">
                            <li>
                                <a href="#!" class="nav__link">Home</a>
                            </li>
                            <li>
                                <a href="#!" class="nav__link">Blog</a>
                            </li>
                            <li>
                                <a href="#!" class="nav__link">Contact Us</a>
                            </li>
                            <li>
                                <a href="#!" class="nav__link">Services</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>

        <!-- Hero -->
        <section class="hero">
            <div class="container">
                <p class="hero__desc">Delicious Cafe</p>
                <h1 class="hero__heading">Sweet Treats, Perfect Eats</h1>
                <div class="hero__cta">
                    <a href="#!" class="btn hero__btn">Shop Now</a>
                    <a href="#!" class="hero__link">Learn More</a>
                </div>
            </div>
        </section>

        <!-- Script -->
        <script>
            const header = document.querySelector('.header');
            const hero = document.querySelector('.hero');

            window.addEventListener('scroll', () => {
                header.classList.toggle('scrolled', window.scrollY >= hero.offsetHeight);
            });
        </script>
    </body>
</html>
